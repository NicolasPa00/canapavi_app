<section class="lines section" id="lineas" aria-labelledby="lines-title">
  <span class="lines__toile" aria-hidden="true"></span>

  <div class="container">
    <app-section-heading
      headingId="lines-title"
      eyebrow="Cómo trabajamos"
      heading="Cinco líneas que sostienen nuestro propósito"
      intro="Articulamos investigación, educación y gestión para que la cultura del Pacífico siga viva y se transmita."
    />

    <ul class="lines__grid" role="list">
      @for (line of lines; track line.id; let i = $index) {
        <li class="line-card" appReveal [attr.data-reveal-delay]="i + 1">
          <span class="line-card__icon" aria-hidden="true">
            @switch (line.icon) {
              @case ('research') {
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6" /><path d="M20 20l-4-4" /></svg>
              }
              @case ('education') {
                <svg viewBox="0 0 24 24"><path d="M3 8l9-4 9 4-9 4-9-4Z" /><path d="M7 10v5c0 1 2.2 2.5 5 2.5s5-1.5 5-2.5v-5" /></svg>
              }
              @case ('community') {
                <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3" /><circle cx="17" cy="9" r="2.5" /><path d="M3 19c0-3 2.5-5 5-5s5 2 5 5" /><path d="M15 19c0-2 1-3.5 3-3.5" /></svg>
              }
              @case ('culture') {
                <svg viewBox="0 0 24 24"><path d="M12 3l2.4 5 5.6.6-4.2 3.7 1.3 5.5L12 20.3 6.9 22.8l1.3-5.5L4 13.6l5.6-.6L12 3Z" /></svg>
              }
              @case ('voices') {
                <svg viewBox="0 0 24 24"><path d="M4 12h2M8 7v10M12 4v16M16 8v8M20 11h0" /></svg>
              }
            }
          </span>

          <h3 class="line-card__title">{{ line.title }}</h3>
          <p class="line-card__desc">{{ line.description }}</p>
          <span class="line-card__index" aria-hidden="true">0{{ i + 1 }}</span>
        </li>
      }
    </ul>
  </div>
</section>
